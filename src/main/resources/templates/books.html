<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Store</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .page-title {
            font-weight: 700;
        }

        .card {
            border: none;
            border-radius: 14px;
        }

        .table th,
        .table td {
            vertical-align: middle;
        }

        .badge-stock {
            font-size: 0.9rem;
            padding: 0.5em 0.75em;
        }

        .search-card,
        .table-card {
            box-shadow: 0 0.125rem 0.5rem rgba(0, 0, 0, 0.06);
        }

        .pagination .page-link {
            border-radius: 8px !important;
            margin: 0 3px;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <!-- Header -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        <div>
            <h1 class="page-title mb-1">Book Store</h1>
            <p class="text-muted mb-0">Manage books with search and pagination</p>
        </div>

        <div>
            <a th:href="@{/books/new}" class="btn btn-primary btn-lg">
                + Add New Book
            </a>
        </div>
    </div>

    <!-- Search Box -->
    <div class="card search-card mb-4">
        <div class="card-body">
            <form th:action="@{/books}" method="get" class="row g-3 align-items-center">
                <div class="col-md-8">
                    <input
                            type="text"
                            name="keyword"
                            class="form-control form-control-lg"
                            placeholder="Search by name, author, or ISBN"
                            th:value="${keyword}">
                </div>

                <div class="col-md-2">
                    <input type="hidden" name="size" th:value="${size}">
                    <button type="submit" class="btn btn-dark btn-lg w-100">Search</button>
                </div>

                <div class="col-md-2">
                    <a th:href="@{/books}" class="btn btn-secondary btn-lg w-100">Reset</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card table-card">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>ISBN</th>
                        <th>Name</th>
                        <th>Author</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th class="text-center">Actions</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:if="${#lists.isEmpty(books)}">
                        <td colspan="7" class="text-center text-muted py-5">
                            No books found.
                        </td>
                    </tr>

                    <tr th:each="book : ${books}">
                        <td th:text="${book.id}"></td>
                        <td th:text="${book.isbn}"></td>
                        <td th:text="${book.name}"></td>
                        <td th:text="${book.author}"></td>
                        <td>
                            <span class="badge bg-success badge-stock">
                                ৳ <span th:text="${book.price}"></span>
                            </span>
                        </td>
                        <td>
                            <span th:if="${book.stock > 0}"
                                  class="badge bg-info text-dark badge-stock"
                                  th:text="${book.stock}">
                            </span>

                            <span th:if="${book.stock <= 0}"
                                  class="badge bg-danger badge-stock">
                                Out of Stock
                            </span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/books/edit/{id}(id=${book.id})}"
                               class="btn btn-warning btn-sm me-2">
                                Edit
                            </a>

                            <a th:href="@{/books/delete/{id}(id=${book.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Are you sure you want to delete this book?');">
                                Delete
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Footer Info -->
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mt-4 gap-3">
                <div class="text-muted">
                    <span th:if="${bookPage.totalElements > 0}">
                        Showing page <strong th:text="${currentPage + 1}"></strong>
                        of <strong th:text="${totalPages}"></strong>
                        |
                        Total books: <strong th:text="${bookPage.totalElements}"></strong>
                    </span>
                </div>

                <!-- Pagination -->
                <nav th:if="${totalPages > 0}">
                    <ul class="pagination mb-0 flex-wrap">

                        <!-- First -->
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/books(page=0, size=${size}, keyword=${keyword})}">
                                First
                            </a>
                        </li>

                        <!-- Previous -->
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/books(page=${currentPage - 1}, size=${size}, keyword=${keyword})}">
                                Previous
                            </a>
                        </li>

                        <!-- Page Numbers -->
                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(
                                currentPage > 2 ? currentPage - 2 : 0,
                                currentPage + 2 < totalPages - 1 ? currentPage + 2 : totalPages - 1
                            )}"
                            th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link"
                               th:href="@{/books(page=${i}, size=${size}, keyword=${keyword})}"
                               th:text="${i + 1}">
                            </a>
                        </li>

                        <!-- Next -->
                        <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/books(page=${currentPage + 1}, size=${size}, keyword=${keyword})}">
                                Next
                            </a>
                        </li>

                        <!-- Last -->
                        <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                            <a class="page-link"
                               th:href="@{/books(page=${totalPages - 1}, size=${size}, keyword=${keyword})}">
                                Last
                            </a>
                        </li>

                    </ul>
                </nav>
            </div>

        </div>
    </div>
</div>

</body>
</html>
