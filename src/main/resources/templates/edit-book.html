<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0">Edit Book</h4>
                </div>

                <div class="card-body">

                    <form th:action="@{/books/update/{id}(id=${book.id})}"
                          th:object="${book}"
                          method="post">

                        <!-- ISBN -->
                        <div class="mb-3">
                            <label class="form-label">ISBN</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{isbn}">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('isbn')}"
                                 th:errors="*{isbn}">
                            </div>
                        </div>

                        <!-- Name -->
                        <div class="mb-3">
                            <label class="form-label">Book Name</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{name}">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('name')}"
                                 th:errors="*{name}">
                            </div>
                        </div>

                        <!-- Author -->
                        <div class="mb-3">
                            <label class="form-label">Author</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{author}">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('author')}"
                                 th:errors="*{author}">
                            </div>
                        </div>

                        <!-- Price -->
                        <div class="mb-3">
                            <label class="form-label">Price</label>
                            <input type="number"
                                   step="0.01"
                                   min="0"
                                   class="form-control"
                                   th:field="*{price}">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('price')}"
                                 th:errors="*{price}">
                            </div>
                        </div>

                        <!-- Stock -->
                        <div class="mb-3">
                            <label class="form-label">Stock</label>
                            <input type="number"
                                   min="0"
                                   class="form-control"
                                   th:field="*{stock}">
                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('stock')}"
                                 th:errors="*{stock}">
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/books}" class="btn btn-secondary">
                                Cancel
                            </a>

                            <button type="submit" class="btn btn-warning">
                                Update Book
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
