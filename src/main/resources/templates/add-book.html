<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h2 class="mb-0">Add New Book</h2>
                </div>

                <div class="card-body p-4">

                    <form th:action="@{/books}" th:object="${book}" method="post">

                        <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger">
                            Please fix the errors below.
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">ISBN</label>
                            <input type="text"
                                   th:field="*{isbn}"
                                   class="form-control"
                                   placeholder="Enter ISBN">
                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('isbn')}"
                                 th:errors="*{isbn}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Book Name</label>
                            <input type="text"
                                   th:field="*{name}"
                                   class="form-control"
                                   placeholder="Enter book name">
                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('name')}"
                                 th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Author</label>
                            <input type="text"
                                   th:field="*{author}"
                                   class="form-control"
                                   placeholder="Enter author name">
                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('author')}"
                                 th:errors="*{author}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Price</label>
                            <input type="number"
                                   min="0"
                                   step="0.01"
                                   th:field="*{price}"
                                   class="form-control"
                                   placeholder="Enter price">
                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('price')}"
                                 th:errors="*{price}"></div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Stock</label>
                            <input type="number"
                                   min="0"
                                   th:field="*{stock}"
                                   class="form-control"
                                   placeholder="Enter stock quantity">
                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('stock')}"
                                 th:errors="*{stock}"></div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/books}" class="btn btn-secondary px-4">Back</a>
                            <button type="submit" class="btn btn-primary px-4">Save Book</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
